<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Mailer Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="admin-app">
      <aside class="admin-sidebar" aria-label="Admin navigation">
        <a class="brand admin-brand" href="/admin.html" aria-label="E-Mailer Admin">
          <span class="brand-mark" aria-hidden="true">E</span>
          <span>
            <span class="brand-word">E-Mailer</span>
            <small>Admin Console</small>
          </span>
        </a>

        <nav class="admin-nav">
          <a class="active" href="#domains"><span class="icon icon-server"></span> Domains</a>
          <a href="#mailboxes"><span class="icon icon-mail"></span> Mailboxes</a>
          <a href="#security"><span class="icon icon-shield"></span> Security</a>
          <a href="#logs"><span class="icon icon-list"></span> Logs</a>
        </nav>

        <a class="back-to-mail" href="/">Open Mail UI</a>
      </aside>

      <section class="admin-main">
        <header class="admin-header">
          <div>
            <p>Server setup</p>
            <h1>Domain Setup</h1>
          </div>
          <div class="status-chip" id="api-status">Checking API</div>
        </header>

        <section class="admin-layout">
          <form id="domain-form" class="domain-form">
            <div>
              <p class="form-kicker">New domain</p>
              <h2>Add a mail domain</h2>
            </div>

            <label>
              <span>Domain</span>
              <input id="domain-name" name="name" placeholder="example.com" autocomplete="off" required />
            </label>

            <label>
              <span>Mail hostname</span>
              <input id="domain-hostname" name="hostname" placeholder="mail.example.com" autocomplete="off" />
            </label>

            <button type="submit">Generate DNS records</button>
          </form>

          <section class="admin-summary">
            <div class="summary-card">
              <span>Domains</span>
              <strong id="domain-count">0</strong>
            </div>
            <div class="summary-card">
              <span>Required DNS records</span>
              <strong>5</strong>
            </div>
            <div class="summary-card">
              <span>Supported OS</span>
              <strong>Debian / Ubuntu</strong>
            </div>
          </section>
        </section>

        <section class="domain-list" id="domain-list" aria-live="polite"></section>
      </section>
    </main>

    <template id="domain-template">
      <article class="domain-card">
        <div class="domain-card-head">
          <div>
            <h3></h3>
            <p></p>
          </div>
          <span>DNS required</span>
        </div>
        <div class="records"></div>
      </article>
    </template>

    <script src="/admin.js"></script>
  </body>
</html>
