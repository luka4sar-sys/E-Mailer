services:
  api:
    build:
      context: ./apps/api
    environment:
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-emailer}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-emailer}
      E_MAILER_HOSTNAME: ${E_MAILER_HOSTNAME:-mail.example.com}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    restart: unless-stopped

  admin-ui:
    build:
      context: ./apps/admin-ui
    environment:
      API_URL: http://api:3000
    depends_on:
      - api
    ports:
      - "${ADMIN_UI_PORT:-8080}:80"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emailer}
      POSTGRES_USER: ${POSTGRES_USER:-emailer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emailer} -d ${POSTGRES_DB:-emailer}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:
